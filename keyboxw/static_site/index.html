<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keybox Web</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1a73e8;
        }
        p {
            color: #5f6368;
        }
        .search-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input[type="email"] {
            padding: 0.8rem;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            padding: 0.8rem 1.5rem;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1557b0;
        }
        #result {
            margin-top: 1.5rem;
            text-align: left;
            padding: 1rem;
            border-radius: 4px;
            display: none;
            word-break: break-all;
            white-space: pre-wrap;
            font-family: monospace;
            background-color: #f8f9fa;
            border: 1px solid #dadce0;
        }
        .error {
            color: #d93025;
            background-color: #fce8e6;
            border-color: #fad2cf;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Keybox Web</h1>
        <p>Your secure serverless password manager.</p>
        <p>Status: Online</p>

        <div class="search-container">
            <input type="email" id="emailInput" placeholder="Enter email address" required>
            <button onclick="searchPublicKey()">Search Public Key</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
        async function searchPublicKey() {
            const email = document.getElementById('emailInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!email) {
                alert('Please enter an email address');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.textContent = 'Searching...';

            try {
                const response = await fetch(`/get_public_key?email=${encodeURIComponent(email)}`);
                const data = await response.json();

                if (response.ok) {
                    resultDiv.textContent = `Public Key for ${data.email}:\n\n${data.public_key}`;
                } else {
                    resultDiv.classList.add('error');
                    resultDiv.textContent = `Error: ${data.message || 'Failed to retrieve public key'}`;
                }
            } catch (error) {
                resultDiv.classList.add('error');
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
